name: 📌 Check PR

on:
    pull_request:
        types:
            - opened
            - edited
            - synchronize
            - ready_for_review

permissions:
    pull-requests: read

jobs:
    validate:
        name: validate PR title
        if: github.repository == 'dream-num/univer' && !github.event.pull_request.draft
        runs-on: minimum-runner

        steps:
            - uses: amannn/action-semantic-pull-request@v6
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  subjectPattern: ^(?![A-Z]).+$
